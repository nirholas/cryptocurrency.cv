upstream nextjs_cluster {
    # Least-connections — routes to the instance with fewest active connections
    # (best for mixed short API requests + long SSE connections).
    least_conn;

    # docker-compose --scale app=N creates N containers on this hostname.
    server app:3000 max_fails=3 fail_timeout=30s;
}

upstream websocket_cluster {
    # ip_hash — sticky sessions keep a client on the same WS instance for the
    # lifetime of its connection (important for subscription state).
    ip_hash;

    server websocket:8080 max_fails=3 fail_timeout=30s;
}

# --- Rate limiting zones (shared across NGINX workers) ---
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# --- Response cache ---
# Key includes query string + Accept header so JSON vs HTML responses
# don't share a cache entry.
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:50m
                 max_size=1g inactive=10m use_temp_path=off;

server {
    listen 80;
    server_name _;

    # --- Buffers & timeouts ---
    client_max_body_size 10m;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/javascript
        text/plain
        text/xml
        text/event-stream;

    # --- Security headers ---
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # --- Health (NGINX itself, not upstream) ---
    location /nginx-health {
        access_log off;
        return 200 '{"status":"ok","proxy":"nginx"}';
        add_header Content-Type application/json;
    }

    # --- WebSocket upgrade ---
    location /ws {
        limit_conn conn_limit 100;

        proxy_pass http://websocket_cluster;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep WS connections alive for up to 1 hour
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # WS health / stats endpoints (HTTP, no upgrade)
    location ~ ^/(health|stats|channels|prices)$ {
        proxy_pass http://websocket_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- SSE and streaming API routes --- long-lived, no caching
    location ~ ^/api/(sse|news/stream|prices/stream) {
        limit_conn conn_limit 200;

        proxy_pass http://nextjs_cluster;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Disable everything that would buffer a streaming response
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering no always;
    }

    # --- API routes (cached at edge) ---
    location /api/ {
        limit_req zone=api_general burst=60 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs_cluster;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache key includes query string + Accept so that
        # JSON vs HTML responses don't share cache entries.
        proxy_cache api_cache;
        proxy_cache_key "$request_uri|$http_accept";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_background_update on;
        proxy_cache_lock on;            # request coalescing — 1 upstream fetch per key
        proxy_cache_lock_timeout 5s;
        proxy_cache_valid 200 60s;      # default; overridden by upstream s-maxage
        proxy_cache_valid 404 10s;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # --- Next.js immutable build assets ---
    location /_next/static/ {
        proxy_pass http://nextjs_cluster;
        proxy_cache api_cache;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # --- Static assets / pages ---
    location / {
        proxy_pass http://nextjs_cluster;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
