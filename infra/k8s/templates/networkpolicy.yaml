{{- if .Values.networkPolicy.enabled }}
# Allow web pods to receive traffic from ingress and talk to Redis/Postgres
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "free-crypto-news.fullname" . }}-web
  labels:
    {{- include "free-crypto-news.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "free-crypto-news.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}  # Allow from ingress controller namespace
      ports:
        - port: {{ .Values.web.port }}
          protocol: TCP
  egress:
    - to: []  # Allow all egress (upstream APIs, Redis, Postgres, Inngest)
---
# WebSocket network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "free-crypto-news.fullname" . }}-websocket
  labels:
    {{- include "free-crypto-news.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "free-crypto-news.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: websocket
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - port: {{ .Values.websocket.port }}
          protocol: TCP
  egress:
    - to: []
---
# Default deny for uncategorized pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "free-crypto-news.fullname" . }}-default-deny
  labels:
    {{- include "free-crypto-news.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
{{- end }}
