{{- if .Values.websocket.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "free-crypto-news.fullname" . }}-websocket
  labels:
    {{- include "free-crypto-news.labels" . | nindent 4 }}
    app.kubernetes.io/component: websocket
spec:
  {{- if not .Values.websocket.autoscaling.enabled }}
  replicas: {{ .Values.websocket.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "free-crypto-news.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: websocket
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "free-crypto-news.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: websocket
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "free-crypto-news.serviceAccountName" . }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: websocket
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "ws-server.js"]
          ports:
            - containerPort: {{ .Values.websocket.port }}
              protocol: TCP
              name: ws
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
          env:
            {{- toYaml .Values.websocket.env | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.websocket.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.websocket.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.websocket.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "free-crypto-news.fullname" . }}-websocket
  labels:
    {{- include "free-crypto-news.labels" . | nindent 4 }}
    app.kubernetes.io/component: websocket
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: {{ .Values.websocket.port }}
      protocol: TCP
      name: ws
  selector:
    {{- include "free-crypto-news.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: websocket
{{- end }}
