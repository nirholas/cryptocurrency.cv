# =============================================================================
# Nginx Reverse Proxy for free-crypto-news (1 M+ users)
#
# Features:
#   • Upstream round-robin across N app containers
#   • Connection keep-alive to backends (reduces TCP overhead)
#   • Gzip / Brotli compression
#   • Aggressive static-asset caching (1 year immutable)
#   • WebSocket upgrade for /ws and /api/ws
#   • Rate limiting at the edge (defence-in-depth alongside Upstash)
#   • Health-check endpoint forwarding
# =============================================================================

worker_processes auto;          # one worker per CPU core
worker_rlimit_nofile 65535;     # match `ulimit -n` on the host

events {
  worker_connections 16384;     # 1 M users ÷ ~60 connections each
  use epoll;
  multi_accept on;
}

http {
  # ── Basics ────────────────────────────────────────────────────────────
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile    on;
  tcp_nopush  on;
  tcp_nodelay on;

  keepalive_timeout   65;
  keepalive_requests  1000;

  # Hide server version
  server_tokens off;

  # ── Logging ───────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

  access_log /var/log/nginx/access.log main buffer=64k flush=5s;
  error_log  /var/log/nginx/error.log warn;

  # ── Compression ───────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   4;
  gzip_min_length   256;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml application/rss+xml
    application/atom+xml image/svg+xml;

  # ── Rate Limiting (defence-in-depth) ──────────────────────────────────
  # 10 MB zone ≈ 160 K unique IPs tracked simultaneously
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=general:10m rate=60r/s;
  limit_req_status 429;

  # ── Upstreams ─────────────────────────────────────────────────────────
  upstream app_backend {
    least_conn;                           # send to the least-busy instance
    keepalive 64;                         # persistent connections to backends

    # Docker Compose DNS resolves "app" to every replica
    server app:3000 max_fails=3 fail_timeout=15s;
  }

  upstream ws_backend {
    server websocket:8080;
  }

  # ── Server ────────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # -- Health check (bypass rate limiting) --
    location = /api/health {
      proxy_pass http://app_backend;
      proxy_set_header Host $host;
    }

    # -- API routes (rate-limited) --
    location /api/ {
      limit_req zone=api burst=60 nodelay;

      proxy_pass         http://app_backend;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-ID      $request_id;

      # Timeouts
      proxy_connect_timeout 5s;
      proxy_read_timeout    30s;
      proxy_send_timeout    10s;

      # Buffer responses in memory to free the backend quickly
      proxy_buffering        on;
      proxy_buffer_size      8k;
      proxy_buffers          16 16k;
      proxy_busy_buffers_size 32k;
    }

    # -- WebSocket endpoints --
    location ~ ^/(ws|api/ws|api/sse) {
      proxy_pass         http://ws_backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_read_timeout 86400s;    # keep WS connections alive
    }

    # -- Static assets (Next.js _next/static) --
    location /_next/static/ {
      proxy_pass http://app_backend;
      proxy_cache_valid 200 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
      proxy_set_header Host $host;
    }

    # -- Everything else (pages, etc.) --
    location / {
      limit_req zone=general burst=120 nodelay;

      proxy_pass         http://app_backend;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
