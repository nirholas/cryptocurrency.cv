<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable icon: content within 80% safe zone, full-bleed background -->
  
  <!-- Full bleed background -->
  <rect width="512" height="512" fill="#000"/>
  
  <!-- Content within safe zone (centered, scaled to 70%) -->
  <g transform="translate(256, 256) scale(0.7) translate(-256, -256)">
    <!-- Bitcoin symbol -->
    <text x="256" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="260" font-weight="700" fill="#fff" text-anchor="middle">₿</text>
  </g>
</svg>
